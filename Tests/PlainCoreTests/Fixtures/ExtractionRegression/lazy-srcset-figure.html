<!doctype html>
<html>
  <head>
    <title>Lazy image regression</title>
  </head>
  <body>
    <article>
      <p>The story has enough text before the image to be treated as a readable document instead of a loose media shell.</p>
      <figure>
        <img src="data:image/gif;base64,R0lGODlhAQABAAAAACw="
             data-src="https://cdn.example.net/photos/medium.jpg"
             data-srcset="https://cdn.example.net/photos/small.jpg 480w, https://cdn.example.net/photos/large.jpg 1280w"
             alt="Lazy CDN image">
        <figcaption>A lazy image.</figcaption>
      </figure>
    </article>
  </body>
</html>
